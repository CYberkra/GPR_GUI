name: Code Quality

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - '.github/workflows/lint.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============ 代码格式检查 ============
  black:
    name: Black Formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    
    - name: Install Black
      run: pip install black
    
    - name: Check code formatting
      run: black --check --diff .

  # ============ 代码风格检查 ============
  flake8:
    name: Flake8 Linting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    
    - name: Install Flake8
      run: pip install flake8 flake8-bugbear
    
    - name: Lint with Flake8 (Critical Errors)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Lint with Flake8 (Style Issues)
      run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ============ 静态代码分析 ============
  pylint:
    name: Pylint Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    
    - name: Install dependencies
      run: |
        pip install pylint PyQt6 numpy scipy matplotlib
        [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
        [ -f requirements.txt ] && pip install -r requirements.txt || true
    
    - name: Run Pylint
      run: pylint *.py src/ --disable=all --enable=E,F,W,R,C --max-line-length=127

  # ============ 类型检查 ============
  mypy:
    name: Type Checking (Mypy)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    
    - name: Install dependencies
      run: |
        pip install mypy types-PyQt6 PyQt6 numpy scipy matplotlib
        [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true
        [ -f requirements.txt ] && pip install -r requirements.txt || true
    
    - name: Run Mypy
      run: mypy . --ignore-missing-imports --pretty --show-error-codes || true
      continue-on-error: true  # 类型检查初期允许失败

  # ============ 总结报告 ============
  lint-summary:
    name: Lint Summary
    needs: [black, flake8, pylint, mypy]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check All Jobs Status
      run: |
        echo "## Code Quality Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Black | ${{ needs.black.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Flake8 | ${{ needs.flake8.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Pylint | ${{ needs.pylint.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Mypy | ${{ needs.mypy.result }} |" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.black.result }}" == "failure" ] || [ "${{ needs.flake8.result }}" == "failure" ] || [ "${{ needs.pylint.result }}" == "failure" ]; then
          echo "❌ Code quality checks failed" >> $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "✅ All code quality checks passed" >> $GITHUB_STEP_SUMMARY
        fi
